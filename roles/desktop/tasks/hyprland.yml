- name: Install Hyperland
  pacman:
    name: 
      - hyprland
      - hyprpicker
    state: present
  become: yes

- name: Install ags and walker
  kewlfft.aur.aur:
   use: paru
   name: 
    - aylurs-gtk-shell
    - walker
   state: present
  become: yes
  become_user: "{{ ansible_env.USER }}"
  