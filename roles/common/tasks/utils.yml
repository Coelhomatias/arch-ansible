- name: Install terminal utils
  pacman:
    name:
      - eza
      - jq
      - ffmpegthumbnailer
      - network-manager-applet
      - flameshot
      - tmux
      - poppler
      - zoxide
      - fzf
      - ripgrep
      - bat
      - fd
      - bc
      - btop
      - git-delta
      - unarchiver
      - stow
      - thefuck
      - playerctl
    state: present
  become: yes

- name: Install terminal utils from AUR
  kewlfft.aur.aur:
    use: paru
    name:
      - tlrc
      - sesh-bin
      - ijq
      - light
      - rnr
    state: present
  notify: Add user to the video group
  become: yes
  become_user: "{{ ansible_env.USER }}"

